<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body onload="load()">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand">ToDo List</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>
    </nav>
    <div class="mx-5 my-3">
        <label for="title" class="form-label">Title</label>
        <input type="text" class="form-control" id="title">
        <div id="titleHelp" class="form-text">Add an item to the list</div>
    </div>
    <div class="mx-5 my-3">
        <label for="description" class="form-label">Description</label>
        <textarea class="form-control" id="description" rows="3"></textarea>
    </div>
    <button id='add' class="btn btn-primary mx-5 my-3">Add to List</button>
    <button id='clearList' class="btn btn-danger mx-5 my-3">Clear List</button>
    <table class="table m-5 mb-3">
        <thead>
            <tr>
                <th scope="col">S No.</th>
                <th scope="col">Title</th>
                <th scope="col">Description</th>
                <th scope="col">Checked</th>
                <th scope="col">Actions</th>
            </tr>
        </thead>
        <tbody id="tbody">
        </tbody>
    </table>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script type="text/Javascript" src="ToDoList.js"></script>    
</body>
</html>
